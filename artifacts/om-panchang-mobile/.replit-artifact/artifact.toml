kind = "mobile"
previewPath = "/om-panchang-mobile/"
title = "Om Panchang Mobile"
version = "1.0.0"
id = "artifacts/om-panchang-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/om-panchang-mobile/" ]
localPort = 25720

[services.development]
run = "pnpm --filter @workspace/om-panchang-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/om-panchang-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/om-panchang-mobile", "run", "serve" ]

[services.env]
PORT = "25720"
BASE_PATH = "/om-panchang-mobile/"
