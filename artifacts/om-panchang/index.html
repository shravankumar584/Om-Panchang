            <section style="margin-bottom: 32px;">
              <h2 style="color: #4338ca; border-bottom: 2px solid #e0e7ff; padding-bottom: 8px;">What is Panchang?</h2>
              <p>Panchang (also spelled Panchangam or Panchaanga) is the Hindu almanac that provides five essential elements of each day according to the Hindu calendar: <strong>Tithi</strong> (lunar day), <strong>Nakshatra</strong> (lunar mansion), <strong>Yoga</strong> (auspicious combination), <strong>Karana</strong> (half-day), and <strong>Vara</strong> (weekday). These five elements are used by Hindus worldwide to determine auspicious timings for ceremonies, rituals, and important life events.</p>
            </section>

            <section style="margin-bottom: 32px;">
              <h2 style="color: #4338ca; border-bottom: 2px solid #e0e7ff; padding-bottom: 8px;">Daily Panchang Features</h2>
              <ul style="line-height: 2;">
                <li><strong>Tithi</strong> – Today's lunar day (Pratipada through Amavasya/Purnima)</li>
                <li><strong>Nakshatra</strong> – Moon's position among the 27 lunar mansions (Ashwini through Revati)</li>
                <li><strong>Yoga</strong> – One of 27 yogas determined by the sum of Sun and Moon longitudes</li>
                <li><strong>Karana</strong> – Half-tithi period (Bava, Balava, Kaulava, Taitila, Gara, Vanija, Vishti)</li>
                <li><strong>Paksha</strong> – Shukla Paksha (waxing moon) or Krishna Paksha (waning moon)</li>
                <li><strong>Sunrise &amp; Sunset</strong> – Accurate astronomical times for your city</li>
                <li><strong>Moonrise &amp; Moonset</strong> – Daily moon timings</li>
                <li><strong>Rahu Kalam</strong> – Inauspicious period to avoid important activities</li>
                <li><strong>Yamagandam</strong> – Period ruled by Yama, avoided for auspicious work</li>
                <li><strong>Gulika Kalam</strong> – Time period of Gulika/Mandi</li>
                <li><strong>Abhijit Muhurta</strong> – The most auspicious time period of the day</li>
                <li><strong>Brahma Muhurta</strong> – Auspicious pre-dawn period for prayer and meditation</li>
              </ul>
            </section>

            <section style="margin-bottom: 32px;">
              <h2 style="color: #4338ca; border-bottom: 2px solid #e0e7ff; padding-bottom: 8px;">Muhurta – Auspicious Timings</h2>
              <p>Muhurta is the Vedic science of selecting the most auspicious time for important activities. Om Panchang provides muhurta calculations for:</p>
              <ul style="line-height: 2;">
                <li><strong>Vivaha Muhurta</strong> – Auspicious wedding dates and times</li>
                <li><strong>Griha Pravesh</strong> – Best time for housewarming ceremony</li>
                <li><strong>Namakaran</strong> – Baby naming ceremony timings</li>
                <li><strong>Upanayana</strong> – Sacred thread ceremony timings</li>
                <li><strong>Business Muhurta</strong> – Auspicious times to start a new venture</li>
                <li><strong>Travel Muhurta</strong> – Best directions and times for important journeys</li>
              </ul>
            </section>

            <section style="margin-bottom: 32px;">
              <h2 style="color: #4338ca; border-bottom: 2px solid #e0e7ff; padding-bottom: 8px;">Choghadiya &amp; Hora Timings</h2>
              <p><strong>Choghadiya</strong> divides the day into 8 equal parts from sunrise to sunset (and night into 8 parts from sunset to sunrise). Each Choghadiya period is classified as auspicious (Amrit, Shubh, Labh, Char) or inauspicious (Rog, Kaal, Udveg). Om Panchang shows both day and night Choghadiya for any city.</p>
              <p><strong>Hora</strong> (planetary hour) is a Vedic system where each hour of the day is ruled by one of the seven classical planets. The ruling planet of the hora influences the nature of activities best suited for that time.</p>
            </section>

            <section style="margin-bottom: 32px;">
              <h2 style="color: #4338ca; border-bottom: 2px solid #e0e7ff; padding-bottom: 8px;">Hindu Festivals &amp; Vrat Calendar</h2>
              <p>Om Panchang lists all major Hindu festivals and vrat (fasting) days for the entire year, including:</p>
              <ul style="line-height: 2;">
                <li><strong>Ekadashi</strong> – Twice-monthly fasting day dedicated to Lord Vishnu (Margashirsha, Paush, Magh, Phalguna, Chaitra, Vaishakh Ekadashi and more)</li>
                <li><strong>Amavasya</strong> – New moon day for ancestor worship (Pitru Tarpan)</li>
                <li><strong>Purnima</strong> – Full moon day (Guru Purnima, Sharad Purnima, Kartik Purnima)</li>
                <li><strong>Pradosh Vrat</strong> – Bi-monthly fast dedicated to Lord Shiva</li>
                <li><strong>Diwali</strong>, <strong>Holi</strong>, <strong>Navratri</strong>, <strong>Dussehra</strong>, <strong>Janmashtami</strong>, <strong>Ram Navami</strong>, <strong>Ganesh Chaturthi</strong>, <strong>Shivaratri</strong></li>
                <li>Telugu festivals: <strong>Ugadi</strong>, <strong>Sankranti</strong>, <strong>Karthika Masam</strong></li>
              </ul>
            </section>

            <section style="margin-bottom: 32px;">
              <h2 style="color: #4338ca; border-bottom: 2px solid #e0e7ff; padding-bottom: 8px;">Planetary Positions &amp; Vedic Astrology</h2>
              <p>Om Panchang displays current positions of all nine Vedic planets (Navagraha): <strong>Surya</strong> (Sun), <strong>Chandra</strong> (Moon), <strong>Mangal</strong> (Mars), <strong>Budha</strong> (Mercury), <strong>Guru</strong> (Jupiter), <strong>Shukra</strong> (Venus), <strong>Shani</strong> (Saturn), <strong>Rahu</strong> (North Node), and <strong>Ketu</strong> (South Node) — all in their Vedic rashi (zodiac sign).</p>
              <p>The Kundali (birth chart) calculator generates a Vedic horoscope based on birth date, time, and place. Kundali Milan (compatibility matching) calculates Ashtakoot compatibility score (out of 36 points) for marriage compatibility.</p>
            </section>
